<!-- Supabase → Authentication → Emails → Templates → Reset Password
     Asunto: Restablecer tu contraseña
     Mismo layout que la edge function send-email.
     El enlace apunta al dominio del tenant ({{ .RedirectTo }}), no a supabase.co. -->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:32px 0;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <tr><td align="center">
    <table width="480" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e2e5ea;">
      <tr><td style="background:#111;padding:28px 32px;">
        <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;color:#fff;margin-bottom:12px;">Noduus</div>
        <div style="color:#fff;font-size:17px;font-weight:700;">Restablecer tu contraseña</div>
      </td></tr>
      <tr><td style="padding:28px 32px;">
        <p style="margin:0 0 16px;font-size:15px;color:#111;">Hola,</p>
        <p style="margin:0 0 20px;font-size:14px;line-height:1.6;color:#374151;">
          Recibimos un pedido para restablecer la contraseña de <strong>{{ .Email }}</strong>.
          Tocá el botón y definí una nueva.
        </p>
        <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=recovery&next=/admin/reset-password" style="display:inline-block;background:#111;color:#fff;text-decoration:none;font-size:15px;font-weight:600;padding:12px 28px;border-radius:10px;">Definir contraseña →</a>
        <div style="height:1px;background:#eceef1;margin:24px 0;"></div>
        <p style="margin:0;font-size:12px;color:#9aa1ad;line-height:1.6;">
          Si no pediste esto, ignorá el mensaje: tu contraseña no cambia.
        </p>
      </td></tr>
      <tr><td style="background:#f4f5f7;border-top:1px solid #e2e5ea;padding:14px 32px;">
        <span style="font-size:12px;font-weight:800;color:#111;">Noduus</span>
      </td></tr>
    </table>
  </td></tr>
</table>
